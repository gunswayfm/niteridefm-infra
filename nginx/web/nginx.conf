user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    client_body_buffer_size 10M;
    # Global large upload settings
    client_body_timeout 1800s;
    # HTTP/2 settings for large uploads
    http2_body_preread_size 256k;
    http2_recv_buffer_size 4m;
    http2_chunk_size 16k;
    
    client_header_timeout 1800s;
    lingering_timeout 1800s;
    lingering_time 1800s;
    send_timeout 1800s;
    client_max_body_size 10G;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 1800s;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;


    # --- Rate Limiting Zones ---
    # General API: 30 requests/minute per client IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=120r/m;
    # Auth endpoints: 10 requests/minute per client IP (stricter)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=60r/m;
    # Return 429 Too Many Requests (not default 503)
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
