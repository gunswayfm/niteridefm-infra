# CORS Origin Map for NiteRide.FM
# This file should be included in the http context of nginx.conf
# Add this line to /etc/nginx/nginx.conf in the http block:
#   include /etc/nginx/sites-available/cors-map.conf;

# Map to dynamically set CORS origin based on request origin
# This allows multiple specific origins while supporting credentials
map $http_origin $cors_origin {
    default "";
    "~^https://(www\.)?niteride\.fm$" $http_origin;
    "~^https://stream\.niteride\.fm$" $http_origin;
    "~^https://profile\.niteride\.fm$" $http_origin;
    "~^http://localhost:5173$" $http_origin;
    "~^http://localhost:3000$" $http_origin;
}
