# api.niteride.fm - Dedicated API endpoint for all subdomains
# Temporarily serving on Port 80 until SSL certs are provisioned
server {
    listen 443 ssl http2;
    server_name api.niteride.fm;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/api.niteride.fm/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.niteride.fm/privkey.pem; # managed by Certbot
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Logging
    access_log /var/log/nginx/api-access.log json_analytics;
    error_log /var/log/nginx/api-error.log warn;

    # PRIORITIZED MICROSERVICE ROUTING (Regex blocks win in order of appearance)
    
    # [IDENTITY-SERVICE] - Port 3001
    location ~ ^/api/v1/(auth|users|grid) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        add_header X-Niteride-Route "identity" always;
    }

    # [ADMIN-SERVICE] - Port 3002 (Proxied to Stream Server)
    location ~ ^/api/v1/(admin|library|schedule|commercials|primetime|programs|obs-servers|settings|system|diagnostics|stingers|stinger-pairs|shows|channels|transcoding-queue|episodes|show-overrides) {
        proxy_pass http://139.60.162.20:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        add_header X-Niteride-Route "admin" always;
    }
    
    # [GUIDE-SERVICE] - Port 3105
    location ~ ^/api/v1/guide/ {
        proxy_pass http://127.0.0.1:3105;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header X-Niteride-Route "guide" always;
    }

    # [CHAT-SERVICE] - Port 4000
    # Independent chat microservice with RBAC, moderation, and real-time messaging
    location ~ ^/api/v1/chat(/|$) {
        # Rewrite /api/v1/chat and /api/v1/chat/* to /chat and /chat/*
        rewrite ^/api/v1/chat(/.*)?$ /chat$1 break;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        add_header X-Niteride-Route "chat" always;
    }

    # [PUBLIC-API] - Port 3000 (Catch-all for remaining v1 routes)
    location ~ ^/api/v1 {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        proxy_pass_header Access-Control-Max-Age;
        add_header X-Niteride-Route "public" always;
    }

}

# HTTP to HTTPS redirect
server {
    if ($host = api.niteride.fm) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.niteride.fm;
    return 301 https://api.niteride.fm$request_uri;


}
