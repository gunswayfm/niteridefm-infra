# TUS Upload Proxy - Forward to Stream Server
# Proxies port 8443 on Web Node to Stream Server tusd instance
# Deploy to: /etc/nginx/sites-available/tusd-proxy.conf
# Enable with: ln -sf /etc/nginx/sites-available/tusd-proxy.conf /etc/nginx/sites-enabled/
# Note: CORS headers are handled by Stream Server nginx, not here (to avoid duplicates)

server {
    listen 8443 ssl;
    server_name niteride.fm;

    ssl_certificate /etc/letsencrypt/live/niteride.fm/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/niteride.fm/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Logging
    access_log /var/log/nginx/tusd-proxy-access.log;
    error_log /var/log/nginx/tusd-proxy-error.log warn;

    location /uploads/ {
        # Proxy to Stream Server tusd - let Stream Server handle CORS
        proxy_pass https://139.60.162.20:8443;
        proxy_http_version 1.1;
        proxy_ssl_verify off;

        # Forward ALL headers including Authorization
        proxy_pass_request_headers on;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # Critical for large uploads - no size limit
        client_max_body_size 0;
        client_body_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Stream uploads directly (no buffering)
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
