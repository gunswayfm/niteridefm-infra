  # NiteRide.FM - CDN Subdomain Configuration
  # Purpose: Serve HLS playlists (dynamic) and video segments (static)
  # Deploy to: /etc/nginx/sites-available/cdn.niteride.fm.conf
  # Symlink: sudo ln -s /etc/nginx/sites-available/cdn.niteride.fm.conf /etc/nginx/sites-enabled/
  # Test: sudo nginx -t
  # Reload: sudo systemctl reload nginx

  # HTTP server - GCore CDN will handle HTTPS and forward to VPS on HTTP
  server {
      listen 80 default_server;
      server_name cdn.niteride.fm _;

      # Security Headers (CDN-appropriate)
      add_header X-Content-Type-Options "nosniff" always;

      # Logging
      access_log /var/log/nginx/cdn-access.log combined;
      error_log /var/log/nginx/cdn-error.log warn;

      # Gzip Compression
      gzip on;
      gzip_types text/plain application/vnd.apple.mpegurl;
      gzip_proxied any;

      # ACME Challenge location (GCore CDN SSL validation)
      # This MUST be served on HTTP without redirect for certificate validation
      location /.well-known/acme-challenge/ {
          root /var/www/certbot;
          default_type text/plain;

          # Allow GCore's validation servers
          allow all;

          # No caching for challenge files
          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;

          # Log challenge requests for debugging
          access_log /var/log/nginx/acme-challenge.log combined;

          try_files $uri =404;
      }

      # =====================================================================

      # =====================================================================
      # CH1 DYNAMIC PLAYLISTS (Proxy to CH1 server's playlist-generator)
      # Standardized: /stream/ch{N}/ pattern for all channels.
      # =====================================================================
      location /stream/ch1/ {
          proxy_pass http://82.22.53.218:9050/ch1/;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Authorization $http_authorization;
          proxy_pass_header Authorization;

          proxy_cache off;
          proxy_buffering off;

          proxy_hide_header Cache-Control;
          proxy_hide_header Expires;
          proxy_hide_header Pragma;

          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;

          proxy_hide_header Access-Control-Allow-Origin;
          proxy_hide_header Access-Control-Allow-Methods;
          proxy_hide_header Access-Control-Allow-Headers;
          proxy_hide_header Access-Control-Expose-Headers;

          set $cors_origin "*";
          if ($http_origin ~* "^https?://(.*\.)?niteride\.fm$") {
              set $cors_origin $http_origin;
          }
          add_header Access-Control-Allow-Origin $cors_origin always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, Authorization" always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-Stream-Mode" always;

          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin $cors_origin always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, Authorization" always;
              add_header Access-Control-Allow-Credentials "true" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          proxy_connect_timeout 5s;
          proxy_send_timeout 5s;
          proxy_read_timeout 5s;
      }

      # =====================================================================
      # CH1 STATIC SEGMENTS (Reverse proxy to CH1 server at 82.22.53.218)
      # Standardized: /ch{N}-segments/ pattern for all channels.
      # =====================================================================
      location /ch1-segments/ {
          proxy_pass http://82.22.53.218/segments/;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;

          proxy_buffering on;
          proxy_buffer_size   16k;
          proxy_buffers       4 512k;
          proxy_busy_buffers_size 1m;
      }
      # CH2 DYNAMIC PLAYLISTS (Proxy to CH2 server's playlist-generator)
      # Proxies directly to CH2 (82.22.53.167) because the HLS files and Redis
      # state live on that server. A local playlist-generator-ch2 can't access them.
      # MUST be defined BEFORE /stream/ to take precedence via longest prefix
      # =====================================================================
      location /stream/ch2/ {
          proxy_pass http://82.22.53.167:9050/ch2/;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Authorization $http_authorization;
          proxy_pass_header Authorization;

          proxy_cache off;
          proxy_buffering off;

          proxy_hide_header Cache-Control;
          proxy_hide_header Expires;
          proxy_hide_header Pragma;

          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;

          proxy_hide_header Access-Control-Allow-Origin;
          proxy_hide_header Access-Control-Allow-Methods;
          proxy_hide_header Access-Control-Allow-Headers;
          proxy_hide_header Access-Control-Expose-Headers;

          set $cors_origin "*";
          if ($http_origin ~* "^https?://(.*\.)?niteride\.fm$") {
              set $cors_origin $http_origin;
          }
          add_header Access-Control-Allow-Origin $cors_origin always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, Authorization" always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-Stream-Mode" always;

          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin $cors_origin always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, Authorization" always;
              add_header Access-Control-Allow-Credentials "true" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          proxy_connect_timeout 5s;
          proxy_send_timeout 5s;
          proxy_read_timeout 5s;
      }

      # =====================================================================
      # CH2 STATIC SEGMENTS (Reverse proxy to CH2 server at 82.22.53.167)
      # CORS and caching headers are set by the CH2 server — do not duplicate here.
      # =====================================================================
      location /ch2-segments/ {
          proxy_pass http://82.22.53.167/segments/;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;

          proxy_buffering on;
          proxy_buffer_size   16k;
          proxy_buffers       4 512k;
          proxy_busy_buffers_size 1m;
      }

      # =====================================================================
      # CH1 DYNAMIC PLAYLISTS (Node.js Playlist Generator - Port 9050)
      # =====================================================================
      location /stream/ {
          proxy_pass http://82.22.53.218:9050/;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          # CRITICAL: Pass through Authorization header for authentication
          proxy_set_header Authorization $http_authorization;
          proxy_pass_header Authorization;

          # Allow short-term client-side caching (matches server-side 3-4s TTL)
          # This prevents HLS players from refetching playlist for every segment
          proxy_cache off;
          proxy_buffering off;
          
          # FORCE NO-CACHE: Hide upstream headers to prevent conflicts
          proxy_hide_header Cache-Control;
          proxy_hide_header Expires;
          proxy_hide_header Pragma;
          
          # UPDATED: Use no-cache to ensure freshness
          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;

          # Hide CORS headers from backend to prevent duplicates
          proxy_hide_header Access-Control-Allow-Origin;
          proxy_hide_header Access-Control-Allow-Methods;
          proxy_hide_header Access-Control-Allow-Headers;
          proxy_hide_header Access-Control-Expose-Headers;

          # CORS (Dynamic Origin for Credentials Support - fixes ORB)
          set $cors_origin "*";
          if ($http_origin ~* "^https?://(.*\.)?niteride\.fm$") {
              set $cors_origin $http_origin;
          }
          add_header Access-Control-Allow-Origin $cors_origin always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, Authorization" always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-Stream-Mode" always;

          # Handle preflight requests
          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin $cors_origin always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, Authorization" always;
              add_header Access-Control-Allow-Credentials "true" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          # Low timeouts (playlist generation should be <5ms)
          proxy_connect_timeout 5s;
          proxy_send_timeout 5s;
          proxy_read_timeout 5s;
      }

      # =====================================================================
      # LIVE SEGMENTS - NO CACHE (segments are regenerated each stream)
      # CRITICAL: Must be defined BEFORE /segments/ to take precedence
      # =====================================================================
      location /segments/live/ {
          alias /var/www/hls/segments/live/;

          # Enable kernel-level file serving
          sendfile on;
          tcp_nopush on;
          tcp_nodelay on;

          # Correct MIME type for HLS MPEG-TS segments
          types {
              video/mp2t ts;
          }

          # NO CACHE for live segments - they are regenerated each stream session
          # Without this, CDN/browsers serve stale segments from previous streams
          # causing "no audio" or "old audio" issues
          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
          add_header Pragma "no-cache" always;
          expires -1;

          # HTTP range requests (required for seeking)
          add_header Accept-Ranges bytes always;

          # CORS headers for cross-origin HLS playback
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Range" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

          # Handle preflight requests
          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          # Security: Only allow HLS MPEG-TS segment files (.ts)
          location ~ \.(ts)$ {
              try_files $uri =404;
          }
      }

      # =====================================================================
      # CH1 STATIC SEGMENTS (Reverse proxy to CH1 server at 82.22.53.218)
      # CORS and caching headers are set by the CH1 server — do not duplicate here.
      # =====================================================================
      location /segments/ {
          proxy_pass http://82.22.53.218/segments/;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;

          proxy_buffering on;
          proxy_buffer_size   16k;
          proxy_buffers       4 512k;
          proxy_busy_buffers_size 1m;
      }

      # Health check endpoint
      location /health {
          proxy_pass http://82.22.53.218:9050/health;
          access_log off;
      }
  }
