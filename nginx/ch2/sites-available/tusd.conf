# TUS Upload Server - Nginx proxy to tusd on port 8444
# tusd handles CORS headers itself - nginx just proxies
# Deployed automatically by CI/CD from infrastructure/nginx/tusd.conf
# Manual deploy: cp to /etc/nginx/sites-available/tusd.conf and symlink to sites-enabled/

server {
    listen 8443 ssl;
    server_name upload.niteride.fm;

    ssl_certificate /etc/letsencrypt/live/upload.niteride.fm/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/upload.niteride.fm/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /uploads/ {
        proxy_pass http://127.0.0.1:8444;
        proxy_http_version 1.1;

        # Proxy headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization;

        # Critical for large uploads - no size limit
        client_max_body_size 0;
        client_body_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Stream uploads directly (no buffering)
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
