  # NiteRide.FM - CDN Subdomain Configuration
  # Purpose: Serve HLS playlists (dynamic) and video segments (static)
  # Deploy to: /etc/nginx/sites-available/cdn.niteride.fm.conf
  # Symlink: sudo ln -s /etc/nginx/sites-available/cdn.niteride.fm.conf /etc/nginx/sites-enabled/
  # Test: sudo nginx -t
  # Reload: sudo systemctl reload nginx

  # HTTP server - GCore CDN will handle HTTPS and forward to VPS on HTTP
  server {
      listen 80 default_server;
      server_name cdn.niteride.fm _;

      # Security Headers (CDN-appropriate)
      add_header X-Content-Type-Options "nosniff" always;

      # Logging
      access_log /var/log/nginx/cdn-access.log combined;
      error_log /var/log/nginx/cdn-error.log warn;

      # Gzip Compression
      gzip on;
      gzip_types text/plain application/vnd.apple.mpegurl;
      gzip_proxied any;

      # ACME Challenge location (GCore CDN SSL validation)
      # This MUST be served on HTTP without redirect for certificate validation
      location /.well-known/acme-challenge/ {
          root /var/www/certbot;
          default_type text/plain;

          # Allow GCore's validation servers
          allow all;

          # No caching for challenge files
          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;

          # Log challenge requests for debugging
          access_log /var/log/nginx/acme-challenge.log combined;

          try_files $uri =404;
      }

      # =====================================================================
      # DYNAMIC PLAYLISTS (Node.js Playlist Generator - Port 9050)
      # =====================================================================
      location /stream/ {
          proxy_pass http://localhost:9050/;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          # CRITICAL: Pass through Authorization header for authentication
          proxy_set_header Authorization $http_authorization;
          proxy_pass_header Authorization;

          # Allow short-term client-side caching (matches server-side 3-4s TTL)
          # This prevents HLS players from refetching playlist for every segment
          proxy_cache off;
          proxy_buffering off;

          # FORCE NO-CACHE: Hide upstream headers to prevent conflicts
          proxy_hide_header Cache-Control;
          proxy_hide_header Expires;
          proxy_hide_header Pragma;

          # UPDATED: Use no-cache to ensure freshness
          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;

          # Hide CORS headers from backend to prevent duplicates
          proxy_hide_header Access-Control-Allow-Origin;
          proxy_hide_header Access-Control-Allow-Methods;
          proxy_hide_header Access-Control-Allow-Headers;
          proxy_hide_header Access-Control-Expose-Headers;

          # CORS (Dynamic Origin for Credentials Support - fixes ORB)
          set $cors_origin "*";
          if ($http_origin ~* "^https?://(.*\.)?niteride\.fm$") {
              set $cors_origin $http_origin;
          }
          add_header Access-Control-Allow-Origin $cors_origin always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, Authorization" always;
          add_header Access-Control-Allow-Credentials "true" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, X-Stream-Mode" always;

          # Handle preflight requests
          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin $cors_origin always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range, Authorization" always;
              add_header Access-Control-Allow-Credentials "true" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          # Low timeouts (playlist generation should be <5ms)
          proxy_connect_timeout 5s;
          proxy_send_timeout 5s;
          proxy_read_timeout 5s;
      }

      # =====================================================================
      # CH2 SEGMENT URL PREFIX (maps /ch2-segments/ to /var/www/hls/segments/)
      # SEGMENT_BASE_URL=/ch2-segments in .env — CDN routing convention
      # CH1 uses /ch1-segments/, CH2 uses /ch2-segments/ so GCore CDN can route
      # to the correct channel server. Both resolve to the same disk path.
      # =====================================================================
      location /ch2-segments/ {
          alias /var/www/hls/segments/;

          sendfile on;
          tcp_nopush on;
          tcp_nodelay on;

          types {
              video/mp2t ts;
          }

          expires 6s;
          add_header Cache-Control "no-cache" always;
          add_header Accept-Ranges bytes always;

          # CORS
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Range" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          location ~ \.(ts)$ {
              try_files $uri =404;
          }

          location ~ /\. {
              deny all;
              access_log off;
              log_not_found off;
          }

          open_file_cache max=10000 inactive=5m;
          open_file_cache_valid 2m;
          open_file_cache_min_uses 1;
          open_file_cache_errors on;
      }

      # =====================================================================
      # CH1 SEGMENT URL PREFIX (maps /ch1-segments/ to /var/www/hls/segments/)
      # SEGMENT_BASE_URL=/ch1-segments in .env — CDN routing convention
      # CH1 uses /ch1-segments/, CH2 uses /ch2-segments/ so GCore CDN can route
      # to the correct channel server. Both resolve to the same disk path.
      # =====================================================================
      location /ch1-segments/ {
          alias /var/www/hls/segments/;

          sendfile on;
          tcp_nopush on;
          tcp_nodelay on;

          types {
              video/mp2t ts;
          }

          expires 6s;
          add_header Cache-Control "no-cache" always;
          add_header Accept-Ranges bytes always;

          # CORS
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Range" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          location ~ \.(ts)$ {
              try_files $uri =404;
          }

          location ~ /\. {
              deny all;
              access_log off;
              log_not_found off;
          }

          open_file_cache max=10000 inactive=5m;
          open_file_cache_valid 2m;
          open_file_cache_min_uses 1;
          open_file_cache_errors on;
      }

      # =====================================================================
      # LIVE SEGMENTS - NO CACHE (segments are regenerated each stream)
      # CRITICAL: Must be defined BEFORE /segments/ to take precedence
      # =====================================================================
      location /segments/live/ {
          alias /var/www/hls/segments/live/;

          # Enable kernel-level file serving
          sendfile on;
          tcp_nopush on;
          tcp_nodelay on;

          # Correct MIME type for HLS MPEG-TS segments
          types {
              video/mp2t ts;
          }

          # NO CACHE for live segments - they are regenerated each stream session
          # Without this, CDN/browsers serve stale segments from previous streams
          # causing "no audio" or "old audio" issues
          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
          add_header Pragma "no-cache" always;
          expires -1;

          # HTTP range requests (required for seeking)
          add_header Accept-Ranges bytes always;

          # CORS headers for cross-origin HLS playback
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Range" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

          # Handle preflight requests
          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          # Security: Only allow HLS MPEG-TS segment files (.ts)
          location ~ \.(ts)$ {
              try_files $uri =404;
          }
      }

      # =====================================================================
      # STATIC VIDEO SEGMENTS (VOD - Direct nginx serving - 380x faster)
      # =====================================================================
      location /segments/ {
          alias /var/www/hls/segments/;

          # Enable kernel-level file serving (sendfile syscall)
          sendfile on;
          tcp_nopush on;
          tcp_nodelay on;

          # Correct MIME type for HLS MPEG-TS segments
          types {
              video/mp2t ts;
          }

          # Short cache for linear TV segments (different videos reuse segment filenames)
          # e.g. segment_000.ts from "Taj Trip" != segment_000.ts from next video
          expires 6s;
          add_header Cache-Control "no-cache" always;

          # HTTP range requests (required for seeking)
          add_header Accept-Ranges bytes always;

          # CORS headers for cross-origin HLS playback
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Range" always;
          add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

          # Handle preflight requests (must include 'always' flag in if blocks)
          if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type text/plain;
              return 204;
          }

          # Security: Only allow HLS MPEG-TS segment files (.ts)
          location ~ \.(ts)$ {
              try_files $uri =404;
          }

          # Deny access to hidden files
          location ~ /\. {
              deny all;
              access_log off;
              log_not_found off;
          }

          # File access optimizations
          open_file_cache max=10000 inactive=5m;
          open_file_cache_valid 2m;
          open_file_cache_min_uses 1;
          open_file_cache_errors on;
      }

      # Health check endpoint
      location /health {
          proxy_pass http://localhost:9050/health;
          access_log off;
      }
  }
