servers:
  web:
    name: "Web Server"
    host: "194.247.183.37"
    user: "root"
    ssh_key_secret: "WEB_SERVER_SSH_KEY"
    purpose: "Orchestration, Auth, V9 Microservices (Identity, Public, Guide), Nginx proxy"
    repo: "https://github.com/gunswayfm/niteridefm-fe"
    env_file: "/opt/niteride/.env"

  stream:
    name: "Stream Server"
    host: "194.247.182.249"
    user: "root"
    ssh_key_secret: "STREAM_SERVER_SSH_KEY"
    purpose: "HLS streaming, Redis state, Admin backend (Library, Scheduling, Commercials)"
    repo: "https://github.com/gunswayfm/niteridefm-be"
    env_file: "/opt/niteride/.env"

  grid:
    name: "Grid Server"
    host: "82.22.53.68"
    user: "root"
    ssh_key_secret: "GRID_SERVER_SSH_KEY"
    purpose: "Lemmy fork with Supabase auth, PostgreSQL 16, Pictrs"
    repo: "https://github.com/gunswayfm/niteridefm_grid"
    directories:
      - "/opt/niteridefm-grid/"
      - "/opt/niteridefm-grid/docker/"
      - "/opt/niteridefm-grid/crates/"

  monitoring:
    name: "Monitoring Server"
    host: "194.247.182.159"
    user: "root"
    ssh_key_secret: "MONITORING_SERVER_SSH_KEY"
    purpose: "Grafana dashboards, Loki log aggregation"
    services:
      grafana: "http://localhost:3000"
      loki: "http://localhost:3100"

  fe-ppe:
    name: "FE PPE Server"
    host: "82.22.53.147"
    user: "root"
    ssh_key_secret: "FE_PPE_SERVER_SSH_KEY"
    purpose: "Pre-production frontend environment (staging branch)"
    repo: "https://github.com/gunswayfm/niteridefm-fe"
    branch: "staging"

  be-ppe:
    name: "BE PPE Server"
    host: "82.22.53.161"
    user: "root"
    ssh_key_secret: "BE_PPE_SERVER_SSH_KEY"
    purpose: "Pre-production backend environment (staging branch)"
    repo: "https://github.com/gunswayfm/niteridefm-be"
    branch: "staging"

  ch1:
    name: "Channel 1 Server"
    host: "82.22.53.218"
    user: "root"
    ssh_key_secret: "CH1_SERVER_SSH_KEY"
    purpose: "streaming-core CH1 — 9 services (root daemon: 7, niteride daemon: 2). Bootstrap: bootstrap/bootstrap-channel-server.sh 1"
    repo: "https://github.com/gunswayfm/niteridefm-streaming-core"
    env_file: "/opt/niteride/.env"
    nginx_site: "ch1-hls.conf"

  ch2:
    name: "Channel 2 Server"
    host: "82.22.53.167"
    user: "root"
    ssh_key_secret: "CH2_SERVER_SSH_KEY"
    purpose: "streaming-core CH2 — 9 services (root daemon: 7, niteride daemon: 2). Currently runs legacy cdn.niteride.fm.conf nginx; normalization to ch2-hls.conf pending separate PR. Bootstrap: bootstrap/bootstrap-channel-server.sh 2"
    repo: "https://github.com/gunswayfm/niteridefm-streaming-core"
    env_file: "/opt/niteride/.env"
    nginx_site: "cdn.niteride.fm.conf"  # LEGACY — see backlog for normalization
