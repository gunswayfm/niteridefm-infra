# NiteRide.FM sshd hardening drop-in
# Deployed to: /etc/ssh/sshd_config.d/99-niteride-hardening.conf
# Applied by: bootstrap/bootstrap-channel-server.sh (phase_ssh)
#
# Why drop-in form: Ubuntu 24.04's stock /etc/ssh/sshd_config has
# `Include /etc/ssh/sshd_config.d/*.conf` near the top, so directives in
# 99-* drop-ins win over distro defaults for first-match-wins scalars.
# This avoids forking the whole sshd_config (and the dpkg-conffile
# upgrade prompts that come with it).
#
# Scope: scalar directives only. Match blocks have different semantics
# under drop-ins and belong in a separate file if ever needed.
#
# Audit row #11, 2026-05-04 channel-parity audit. Operator-applied state
# on CH1 + CH2 prior to this PR; codified here so fresh-bootstrapped
# channels (and orch / web / grid if this drop-in is reused there) ship
# with the same baseline.

# Disable password-based logins for everyone (root and niteride). Only
# pubkey auth allowed — matches CH1 + CH2 operator state pre-codification.
PermitRootLogin prohibit-password
PasswordAuthentication no
PubkeyAuthentication yes
KbdInteractiveAuthentication no

# Tighter brute-force resistance.
MaxAuthTries 3
LoginGraceTime 20

# Connection-rate limiter. 50:30:100 = first 50 unauthenticated conns
# unrestricted, drop 30% per new conn after that, hard cap at 100.
MaxStartups 50:30:100
